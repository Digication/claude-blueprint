skill: skill-dev
description: Golden dataset for skill-dev — regression tests from dry-run testing rounds
skill_hash: "35ddca9012ad9d0c8c7a137a60d4afe0"

cases:
  - name: "invalid-skill-shows-error"
    description: "When skill name doesn't exist, show error with available skills list"
    category: boundary
    inputs:
      command: "/skill-dev review nonexistent-skill"
      state:
        skill_exists: false
    assert:
      - type: contains
        value: "not found"
      - type: contains-any
        values:
          - "Available skills"
          - "available skills"
      - type: contains
        value: "commit"
      - type: contains
        value: "onboard"
      - type: contains-any
        values:
          - "Which skill"
          - "which skill"
      - type: llm-rubric
        rubric: "Error Message Quality"
        context: "User ran /skill-dev review nonexistent-skill — skill name does not exist"
    source: "Exploratory test 2026-03-28, scenario invalid-skill-name"

  - name: "review-history-recent-no-changes"
    description: "Recent review with no changes offers skip/re-review/cancel options"
    category: boundary
    inputs:
      command: "/skill-dev review commit"
      state:
        reviews_log: "2026-03-25 | review | commit | PASS | 2 | Minor issues"
        git_diff_empty: true
        days_since_review: 3
    assert:
      - type: contains
        value: "2026-03-25"
      - type: contains
        value: "PASS"
      - type: contains-all
        values:
          - "Re-review"
          - "Skip to testing"
          - "Cancel"
    source: "Exploratory test 2026-03-28, scenario review-history-recent — previously AMBIGUOUS, fixed"

  - name: "auto-detect-bare-name-reviews-first"
    description: "Bare skill name triggers review first, then offers to test"
    category: happy-path
    inputs:
      command: "/skill-dev commit"
      state:
        skill_exists: true
        reviews_log_empty: true
    assert:
      - type: contains-any
        values:
          - "Review complete"
          - "review complete"
      - type: contains-any
        values:
          - "test this skill"
          - "dry-run"
          - "Want me to test"
    source: "Exploratory test 2026-03-28, scenario auto-detect-bare-name"

  - name: "scenario-arg-runs-single"
    description: "test <skill> <scenario> runs only that scenario with abbreviated report"
    category: boundary
    inputs:
      command: "/skill-dev test onboard happy-path-beginner"
      state:
        skill_exists: true
    assert:
      - type: not-contains
        value: "Cross-Scenario Analysis"
      - type: contains-any
        values:
          - "happy-path-beginner"
          - "single scenario"
          - "abbreviated"
    source: "Exploratory test 2026-03-28, scenario test-with-scenario-arg — previously AMBIGUOUS, fixed"

  - name: "review-report-has-required-sections"
    description: "Review mode produces report with all required sections"
    category: happy-path
    inputs:
      command: "/skill-dev review commit"
      state:
        skill_exists: true
        reviews_log_empty: true
    assert:
      - type: contains-all
        values:
          - "Skill Review:"
          - "Summary"
          - "Critical Issues"
          - "Recommendations"
          - "Suggestions"
          - "Strengths"
      - type: llm-rubric
        rubric: "Review Quality"
        context: "Full review of the commit skill with no prior review history"
    source: "SKILL.md lines 82-89 define the required report format"

  - name: "scenario-approval-table-format"
    description: "Explore mode presents scenarios in the specified table format before running"
    category: happy-path
    inputs:
      command: "/skill-dev test commit --explore"
      state:
        skill_exists: true
    assert:
      - type: contains-all
        values:
          - "Name"
          - "Category"
          - "What it tests"
      - type: contains-any
        values:
          - "Ready to run"
          - "ready to run"
      - type: llm-rubric
        rubric: "Test Scenario Quality"
        context: "Exploratory test scenarios designed for the commit skill"
    source: "SKILL.md lines 114-122 define scenario approval format — added during fix round"

  - name: "no-args-lists-skills"
    description: "No arguments shows available skills and asks which one"
    category: boundary
    inputs:
      command: "/skill-dev"
      state: {}
    assert:
      - type: contains-any
        values:
          - "commit"
          - "onboard"
          - "task"
      - type: contains-any
        values:
          - "Which skill"
          - "which skill"
          - "What would you like"
    source: "Exploratory test 2026-03-28, scenario no-args-flow"

  - name: "full-mode-l2-fail-still-offers-l4"
    description: "In --full mode, Layer 2 failure skips L3 but still offers Layer 4"
    category: regression
    inputs:
      command: "/skill-dev test someskill --full"
      state:
        layer1_result: PASS
        layer2_result: "first case FAIL"
        has_eval_yaml: true
    assert:
      - type: contains
        value: "FAIL"
      - type: contains-any
        values:
          - "Layer 4"
          - "exploratory"
          - "Exploratory"
      - type: contains-any
        values:
          - "Ready to run"
          - "ready to run"
          - "Want me to run"
          - "run exploratory"
      - type: not-contains
        value: "Layer 3: LLM-as-Judge — PASS"
    source: "Exploratory test 2026-03-30, scenario full-l2-fail-still-offers-l4"

  - name: "layer-3-standalone-no-rubrics-reports-pass"
    description: "--layer 3 with no llm-rubric assertions reports PASS with a note"
    category: regression
    inputs:
      command: "/skill-dev test someskill --layer 3"
      state:
        has_eval_yaml: true
        has_llm_rubrics: false
    assert:
      - type: contains
        value: "PASS"
      - type: contains-any
        values:
          - "no rubrics"
          - "No rubrics"
          - "no llm-rubric"
          - "No llm-rubric"
          - "zero rubrics"
    source: "Exploratory test 2026-03-30, scenario layer-3-standalone-no-rubrics"

  - name: "full-mode-l1-fail-stops-everything"
    description: "In --full mode, Layer 1 failure stops all layers including Layer 4"
    category: regression
    inputs:
      command: "/skill-dev test someskill --full"
      state:
        layer1_result: FAIL
    assert:
      - type: contains
        value: "FAIL"
      - type: not-contains
        value: "Ready to run"
      - type: not-contains
        value: "ready to run"
      - type: contains-any
        values:
          - "Fix"
          - "fix"
          - "structural"
          - "Structural"
    source: "Exploratory test 2026-03-30, scenario full-l1-fail-stops-everything"

  - name: "default-test-l2-skip-cascades-to-l3-skip"
    description: "Default test with no eval.yaml skips both L2 and L3, reports PARTIAL"
    category: regression
    inputs:
      command: "/skill-dev test someskill"
      state:
        layer1_result: PASS
        has_eval_yaml: false
    assert:
      - type: contains
        value: "PARTIAL"
      - type: contains-any
        values:
          - "No golden dataset"
          - "no eval.yaml"
          - "Skipped"
      - type: contains-any
        values:
          - "--explore"
          - "explore"
    source: "Exploratory test 2026-03-30, scenario default-test-l2-skip-cascades"
